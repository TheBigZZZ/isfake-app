name: Supabase Privilege Check

on:
  workflow_dispatch:
    inputs:
      pg_connection_string:
        description: 'Postgres connection string'
        required: true
        type: string

jobs:
  run-privilege-check:
    name: Run Supabase function privilege check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install runtime deps
        run: npm install pg --no-audit --no-fund

      - name: Run privilege check
        env:
          PG_CONNECTION_STRING: ${{ github.event.inputs.pg_connection_string }}
        run: |
          node scripts/run_privilege_check.js
